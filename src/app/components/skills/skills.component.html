<section id="skills" class="skills">
  <div class="container">
    <div class="section-header" appScrollAnimate>
      <span class="section-label">02. What I Know</span>
      <h2 class="section-title">Technical <span>Skills</span></h2>
      <p class="section-subtitle">A deep toolkit built across enterprise Angular projects.</p>
    </div>

    <div class="skills-grid">
      <div class="skill-card" *ngFor="let category of skills; let i = index" appScrollAnimate [animDelay]="i * 80">
        <div class="skill-card-header">
          <span class="skill-icon">{{ category.icon }}</span>
          <h3 class="skill-category">{{ category.category }}</h3>
        </div>
        <div class="skill-items">
          <div class="skill-item" *ngFor="let item of category.items">
            <div class="skill-info">
              <span class="skill-name">{{ item.name }}</span>
              <span class="skill-pct">{{ item.level }}%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-fill" [style.width.%]="item.level"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tools belt row -->
    <div class="tools-belt" appScrollAnimate [animDelay]="200">
      <div class="tools-label mono">// Also comfortable with</div>
      <div class="tools-list">
        <span class="tool-pill" *ngFor="let tool of tools">{{ tool }}</span>
      </div>
    </div>
  </div>
</section>
