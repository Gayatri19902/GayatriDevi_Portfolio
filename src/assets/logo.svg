  </defs>

  <!-- Icon box -->
  <rect width="48" height="48" rx="10" x="2" y="2" fill="url(#bg-g)"/>
  <rect width="48" height="48" rx="10" x="2" y="2" fill="none" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>

