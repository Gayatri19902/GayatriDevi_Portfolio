  <path d="M41 14 L45 24 L41 34" fill="none" stroke="#818CF8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- G in icon -->
  <text x="26" y="32" text-anchor="middle"
