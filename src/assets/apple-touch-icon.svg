<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="180" height="180" rx="40" fill="none" stroke="#2563EB" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Left bracket -->
  <path d="M30 50 L15 90 L30 130" fill="none" stroke="url(#br)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Right bracket -->
  <path d="M150 50 L165 90 L150 130" fill="none" stroke="#818CF8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Big G -->
  <text x="90" y="116"
    text-anchor="middle"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="88"
    fill="url(#tg)">G</text>

  <!-- Bottom dot -->
  <circle cx="90" cy="152" r="7" fill="#3B82F6" opacity="0.9"/>
  <circle cx="90" cy="152" r="12" fill="#3B82F6" opacity="0.18"/>
</svg>
